<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achadinhos da Taty - Inteligência de Vendas</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <img src="logo.png" alt="Achadinhos da Taty Logo">
                <p>Curadoria Inteligente V2</p>
            </div>
            <div class="history-section">
                <h3>HISTÓRICO</h3>
                <ul id="historyList">
                    <!-- Itens via JS -->
                </ul>
            </div>
        </aside>

        <main class="content">
            <header>
                <h2>NEXUS SELLER V2 <span class="badge">Orion Engine</span></h2>
                <div class="status-badge" id="appStatus">Sistema Online</div>
            </header>

            <div class="v2-grid">
                <!-- Coluna de Entrada -->
                <section class="action-card">
                    <div class="card-header">
                        <h3>NOVA ESTRATÉGIA</h3>
                        <p>Envie a foto e receba o lucro.</p>
                    </div>
                    
                    <div id="dropZone" class="upload-area">
                        <input type="file" id="imageInput" accept="image/*" hidden>
                        <div class="upload-prompt">
                            <span class="icon">📸</span>
                            <p>Clique ou arraste a <strong>foto do produto</strong></p>
                            <span class="subtext">JPG, PNG ou WebP</span>
                        </div>
                        <img id="imagePreview" class="hidden">
                    </div>

                    <div class="input-minimal">
                        <label>Preço Sugerido (R$)</label>
                        <input type="text" id="preco" placeholder="0,00">
                    </div>

                    <button id="generateBtnV2" class="btn-main-v2">
                        GERAR ESTRATÉGIA ⚡
                    </button>
                </section>

                <!-- Coluna de Saída -->
                <section class="result-card-v2">
                    <div class="result-header">
                        <h3>ESTRATÉGIA PRONTA</h3>
                        <div class="copy-bar">
                            <button class="copy-tiny" onclick="copyByChannel('whatsapp')">WHATSAPP</button>
                            <button class="copy-tiny" onclick="copyByChannel('instagram')">INSTA</button>
                            <button class="copy-tiny" onclick="copyByChannel('shopee')">SHOPEE</button>
                        </div>
                    </div>
                    <div class="result-box" id="resultDisplay">
                        <div class="placeholder-msg">A inteligência Orion aguarda sua foto...</div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    
    <footer class="main-footer">
        NEXUS SELLER V2 - ESFORÇO ZERO - VIPNEXUS IA 2026
    </footer>

    <script src="/script.js"></script>
</body>
</html>
